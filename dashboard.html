<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - VANTIS AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">VANTIS AI</a>
      <div class="nav-links">
        <a href="builder.html">Bot Builder</a>
        <a href="dashboard.html">My Bots</a>
        <a href="docs.html">Docs</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="dashboard-layout">
      <aside class="dashboard-sidebar">
        <div class="sidebar-section">
          <h3 class="sidebar-heading">Navigation</h3>
          <nav class="sidebar-nav">
            <a href="builder.html" class="sidebar-link sidebar-link-action">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
              Create New Bot
            </a>
            <a href="dashboard.html" class="sidebar-link active">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
              My Bots
            </a>
            <a href="docs.html" class="sidebar-link">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              Documentation
            </a>
          </nav>
        </div>
        <div class="sidebar-section">
          <h3 class="sidebar-heading">Quick Stats</h3>
          <div id="quick-stats">
            <div class="stat-item"><span class="stat-item-label">Total Bots</span><span class="stat-item-value" id="stat-total">0</span></div>
            <div class="stat-item"><span class="stat-item-label">Strategies</span><span class="stat-item-value" id="stat-strategies">-</span></div>
            <div class="stat-item"><span class="stat-item-label">Plan</span><span class="stat-item-value" id="stat-plan">-</span></div>
            <div class="stat-item" id="stat-backtests-container" style="display:none"><span class="stat-item-label">Backtests Today</span><span class="stat-item-value" id="stat-backtests">-</span></div>
          </div>
        </div>
      </aside>

      <main class="dashboard-main">
        <div class="page-header">
          <h1>My Bots</h1>
          <p>Your saved trading bots. Edit, download, or delete them.</p>
        </div>

        <div class="dashboard-grid" id="bots-container">
          <div class="empty-state"><h3>Loading...</h3></div>
        </div>
      </main>
    </div>
  </div>

  <!-- Backtest Modal -->
  <div class="modal-overlay" id="backtest-modal">
    <div class="modal" style="max-width:700px">
      <button class="modal-close" onclick="closeBacktestModal()">&times;</button>
      <h2>Run Backtest</h2>
      <p id="backtest-modal-bot-name"></p>
      <div id="backtest-form">
        <div class="form-row">
          <div class="form-group">
            <label>Symbol</label>
            <select id="bt-symbol"><option>EURUSD</option><option>GBPUSD</option><option>USDJPY</option><option>AUDUSD</option><option>BTCUSD</option></select>
          </div>
          <div class="form-group">
            <label>Timeframe</label>
            <select id="bt-timeframe"><option>M15</option><option>M30</option><option selected>H1</option><option>H4</option><option>D1</option></select>
          </div>
          <div class="form-group">
            <label>Days</label>
            <select id="bt-days"><option value="30">30</option><option value="90">90</option><option selected value="180">180</option><option value="365">365</option></select>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary btn-md" onclick="runBacktestForBot()">Run Backtest</button>
        </div>
      </div>
      <div id="backtest-results" style="display:none"></div>
    </div>
  </div>

  <script src="js/code-generator-mt4.js"></script>
  <script src="js/code-generator-mt5.js"></script>
  <script src="js/app.js"></script>
  <script>
    let backtestingBotId = null;

    async function initDashboard() {
      await renderBots();
      await loadPlanInfo();
    }

    async function loadPlanInfo() {
      try {
        const planData = await getPlan();
        if (planData) {
          document.getElementById('stat-plan').textContent = capitalize(planData.plan);
          document.getElementById('stat-backtests').textContent = `${planData.usage.backtestsToday}/${planData.limits.maxBacktestsPerDay}`;
          document.getElementById('stat-backtests-container').style.display = 'flex';
        }
      } catch {}
    }

    function updateQuickStats(bots) {
      document.getElementById('stat-total').textContent = bots.length;
      const strategies = [...new Set(bots.map(b => (b.configuration || {}).strategy || 'N/A').filter(Boolean))];
      document.getElementById('stat-strategies').textContent = strategies.length || '-';
    }

    async function renderBots() {
      const container = document.getElementById('bots-container');
      try {
        const bots = await getBots();
        updateQuickStats(bots);

        if (!bots || bots.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <h3>No bots yet</h3>
              <p>Create your first trading bot to get started.</p>
              <a href="builder.html" class="btn btn-primary btn-md">Create a Bot</a>
            </div>`;
          return;
        }

        container.innerHTML = bots.map(bot => {
          const cfg = bot.configuration || {};
          const created = bot.created_at || bot.createdAt || bot.created;
          const strat = cfg.strategy || 'N/A';
          return `
            <div class="bot-card">
              <h3>${bot.name}</h3>
              <span class="bot-strategy">${capitalize(strat)}</span>
              <p class="bot-meta">${bot.description || 'No description'}<br>
              Created: ${formatDate(created)}</p>
              <div class="bot-actions">
                <a href="builder.html?edit=${bot.id}" class="btn btn-outline">Edit</a>
                <button class="btn btn-primary" onclick="downloadBot('${bot.id}', 'mt4')">.mq4</button>
                <button class="btn btn-success" onclick="downloadBot('${bot.id}', 'mt5')">.mq5</button>
                <button class="btn btn-accent" onclick="openBacktestModal('${bot.id}', '${bot.name.replace(/'/g, "\\'")}')">Backtest</button>
                <button class="btn btn-danger" onclick="deleteBot('${bot.id}')">Delete</button>
              </div>
            </div>`;
        }).join('');
      } catch (err) {
        container.innerHTML = `<div class="empty-state"><h3>Error loading bots</h3><p>${err.message}</p><a href="builder.html" class="btn btn-primary btn-md">Create a Bot</a></div>`;
      }
    }

    async function downloadBot(id, platform) {
      await downloadBotCode(id, platform);
    }

    async function deleteBot(id) {
      if (!confirm('Delete this bot?')) return;
      try {
        await deleteBot(id);
        await renderBots();
      } catch (err) {
        showAlert('Error deleting bot: ' + err.message, 'error');
      }
    }

    function openBacktestModal(botId, botName) {
      backtestingBotId = botId;
      document.getElementById('backtest-modal-bot-name').textContent = `Bot: ${botName}`;
      document.getElementById('backtest-form').style.display = 'block';
      document.getElementById('backtest-results').style.display = 'none';
      document.getElementById('backtest-modal').classList.add('show');
    }

    function closeBacktestModal() {
      document.getElementById('backtest-modal').classList.remove('show');
      backtestingBotId = null;
    }

    async function runBacktestForBot() {
      const bot = await getBot(backtestingBotId);
      if (!bot) { showAlert('Bot not found', 'error'); return; }

      const symbol = document.getElementById('bt-symbol').value;
      const timeframe = document.getElementById('bt-timeframe').value;
      const days = parseInt(document.getElementById('bt-days').value);

      document.getElementById('backtest-form').style.display = 'none';
      const resultsDiv = document.getElementById('backtest-results');
      resultsDiv.style.display = 'block';
      resultsDiv.innerHTML = '<p style="text-align:center;color:var(--accent)">Running backtest...</p>';

      try {
        const result = await runBacktest(backtestingBotId, bot.configuration, symbol, timeframe, days);
        displayBacktestResults(result);
      } catch (err) {
        resultsDiv.innerHTML = `<p style="color:var(--red)">Error: ${err.message}</p>
          <button class="btn btn-outline btn-md" onclick="document.getElementById('backtest-form').style.display='block';resultsDiv.style.display='none'">Try Again</button>`;
      }
    }

    function displayBacktestResults(result) {
      const m = result.metrics;
      const div = document.getElementById('backtest-results');
      div.innerHTML = `
        <h3 style="margin-bottom:12px">Backtest Results</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:0.85rem;margin-bottom:16px">
          <div class="stat-item"><span class="stat-item-label">Total Trades</span><span class="stat-item-value">${m.totalTrades}</span></div>
          <div class="stat-item"><span class="stat-item-label">Win Rate</span><span class="stat-item-value">${(m.winRate * 100).toFixed(1)}%</span></div>
          <div class="stat-item"><span class="stat-item-label">Profit Factor</span><span class="stat-item-value">${m.profitFactor.toFixed(2)}</span></div>
          <div class="stat-item"><span class="stat-item-label">Net Profit</span><span class="stat-item-value" style="color:${m.netProfit >= 0 ? 'var(--green)' : 'var(--red)'}">${m.netProfit >= 0 ? '+' : ''}$${m.netProfit.toFixed(2)}</span></div>
          <div class="stat-item"><span class="stat-item-label">Max Drawdown</span><span class="stat-item-value" style="color:var(--red)">${(m.maxDrawdown * 100).toFixed(1)}%</span></div>
          <div class="stat-item"><span class="stat-item-label">Sharpe Ratio</span><span class="stat-item-value" style="color:${m.sharpeRatio >= 1 ? 'var(--green)' : 'var(--text-muted)'}">${m.sharpeRatio.toFixed(2)}</span></div>
          <div class="stat-item"><span class="stat-item-label">Avg R:R</span><span class="stat-item-value">${m.avgRR.toFixed(2)}</span></div>
          <div class="stat-item"><span class="stat-item-label">Best Trade</span><span class="stat-item-value" style="color:var(--green)">+$${m.bestTrade.toFixed(2)}</span></div>
          <div class="stat-item"><span class="stat-item-label">Worst Trade</span><span class="stat-item-value" style="color:var(--red)">-$${Math.abs(m.worstTrade).toFixed(2)}</span></div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline btn-md" onclick="document.getElementById('backtest-form').style.display='block';this.parentElement.parentElement.querySelector('h3').textContent='Backtest Results'">Run Again</button>
          <button class="btn btn-primary btn-md" onclick="closeBacktestModal()">Close</button>
        </div>
      `;
    }
  </script>
</body>
</html>
