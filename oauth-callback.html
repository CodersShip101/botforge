<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in... - VANTIS AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container" style="display:flex;align-items:center;justify-content:center;min-height:100vh">
    <div style="text-align:center">
      <h2 style="margin-bottom:12px">Signing you in...</h2>
      <p style="color:var(--text-muted)">Please wait while we complete your authentication.</p>
    </div>
  </div>

  <script
    data-clerk-publishable-key="pk_test_cmVzdGVkLWhhcmUtMzUuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    crossorigin="anonymous"
  ></script>
  <script src="js/app.js"></script>
  <script>
    (async () => {
      try {
        await window.Clerk.load({ publishableKey: 'pk_test_cmVzdGVkLWhhcmUtMzUuY2xlcmsuYWNjb3VudHMuZGV2JA' });

        // Wait for user to become available (up to 10 seconds)
        for (let i = 0; i < 20; i++) {
          if (window.Clerk.user) break;
          await new Promise(r => setTimeout(r, 500));
        }

        if (window.Clerk.user) {
          // Wait for session to be ready
          for (let i = 0; i < 10; i++) {
            if (window.Clerk.session) break;
            await new Promise(r => setTimeout(r, 500));
          }
          const token = await window.Clerk.session?.getToken();
          if (token) {
            localStorage.setItem('clerk_session', token);
            try {
              const userData = await syncClerkUser(token);
              localStorage.setItem('user', JSON.stringify(userData));
            } catch {}
            window.location.href = 'dashboard.html';
            return;
          }
        }

        // Check for pending sign-in from URL params
        const signIn = window.Clerk.client?.signIn;
        if (signIn?.status && signIn.status !== 'needs_identifier') {
          try {
            if (signIn.status === 'complete' && signIn.createdSessionId) {
              await window.Clerk.setActive({ session: signIn.createdSessionId });
              window.location.href = 'dashboard.html';
              return;
            }
          } catch {}
        }

        window.location.href = 'login.html';
      } catch (err) {
        console.error('OAuth callback error:', err);
        window.location.href = 'login.html?error=oauth_failed';
      }
    })();
  </script>
</body>
</html>
