<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - VANTIS AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-form { max-width:420px;margin:60px auto;text-align:center }
    .auth-form h1 { font-size:1.8rem;font-weight:700;margin-bottom:8px }
    .auth-form p.sub { color:var(--text-muted);margin-bottom:24px }
    .auth-card { background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;text-align:left }
    .form-group { margin-bottom:16px }
    .form-group label { display:block;font-size:0.85rem;font-weight:500;margin-bottom:4px;color:var(--text-muted) }
    .form-group input { width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:0.9rem;outline:none;transition:border .2s;box-sizing:border-box }
    .form-group input:focus { border-color:var(--accent) }
    .auth-btn { width:100%;padding:12px;border-radius:8px;border:none;font-family:inherit;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all .2s }
    .auth-btn.primary { background:var(--accent);color:#fff }
    .auth-btn.primary:hover { filter:brightness(1.15) }
    .auth-btn.primary:disabled { opacity:0.5;cursor:not-allowed }
    .auth-error { background:rgba(255,59,59,0.1);border:1px solid var(--red);border-radius:8px;padding:10px 14px;color:var(--red);font-size:0.85rem;margin-bottom:16px;display:none }
    .auth-success { background:rgba(0,255,138,0.1);border:1px solid var(--green);border-radius:8px;padding:10px 14px;color:var(--green);font-size:0.85rem;margin-bottom:16px;display:none }
    .back-link { margin-top:16px;font-size:0.85rem }
    .back-link a { color:var(--accent);text-decoration:none }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">VANTIS AI</a>
      <div class="nav-links">
        <a href="builder.html">Bot Builder</a>
        <a href="dashboard.html">My Bots</a>
        <a href="docs.html">Docs</a>
        <a href="login.html">Sign In</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="auth-form">
      <h1>Forgot Password?</h1>
      <p class="sub">Enter your email and we'll send you a reset link.</p>

      <div class="auth-card">
        <div class="auth-error" id="errorMsg"></div>
        <div class="auth-success" id="successMsg"></div>

        <form id="forgotForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
          </div>
          <button type="submit" class="auth-btn primary" id="submitBtn">Send Reset Link</button>
        </form>

        <div class="back-link">
          <a href="login.html">&larr; Back to Sign In</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('submitBtn');
      const errorEl = document.getElementById('errorMsg');
      const successEl = document.getElementById('successMsg');
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const data = await fetchAPI('/auth/forgot-password', 'POST', { email });
        successEl.textContent = data.message;
        successEl.style.display = 'block';
        document.getElementById('forgotForm').reset();
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
