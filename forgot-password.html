<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - VANTIS AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">VANTIS AI</a>
      <div class="nav-links">
        <a href="builder.html">Bot Builder</a>
        <a href="dashboard.html">My Bots</a>
        <a href="docs.html">Docs</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div style="max-width:420px;margin:60px auto">
      <h1 style="font-size:1.8rem;font-weight:700;margin-bottom:8px">Reset Password</h1>
      <p style="color:var(--text-muted);margin-bottom:24px">Enter your email to receive a password reset code.</p>
      <div id="alert-area" style="position:relative;min-height:0"></div>
      <form id="forgot-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com">
        </div>
        <button type="submit" class="btn btn-primary btn-md" style="width:100%" id="submit-btn">Send Reset Code</button>
      </form>
      <p style="margin-top:16px;text-align:center;color:var(--text-muted);font-size:0.9rem">
        Remember your password? <a href="login.html">Sign In</a>
      </p>
    </div>
  </div>

  <script
    data-clerk-publishable-key="pk_test_Y2xlcmsuc2hpbmluZy1iaXJkLTQyLmNsZXJrLmFjY291bnRzLmRldiQ"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    crossorigin="anonymous"
  ></script>
  <script src="js/app.js"></script>
  <script>
    let clerkReady = false;
    let clerkLoadAttempted = false;

    async function initClerk() {
      if (clerkLoadAttempted) return;
      clerkLoadAttempted = true;
      try {
        const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 5000));
        await Promise.race([window.Clerk.load(), timeout]);
        clerkReady = true;
      } catch (err) {
        console.error('Clerk init error:', err);
        const area = document.getElementById('alert-area');
        area.innerHTML = '<div class="alert alert-error">Clerk failed to load. Check your Clerk publishable key.</div>';
      }
    }

    setTimeout(initClerk, 100);

    function setAlert(msg, type) {
      const area = document.getElementById('alert-area');
      area.innerHTML = '';
      const el = document.createElement('div');
      el.className = 'alert alert-' + type;
      el.textContent = msg;
      area.appendChild(el);
    }

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!clerkReady) { return initClerk().then(() => document.getElementById('forgot-form').dispatchEvent(new Event('submit'))); }
      const email = document.getElementById('email').value;
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        await window.Clerk.client.signIn.create({
          strategy: 'reset_password_email_code',
          identifier: email
        });
        setAlert('If this email is registered, a reset code has been sent.', 'success');
      } catch {
        setAlert('If this email is registered, a reset code has been sent.', 'success');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Code';
      }
    });
  </script>
</body>
</html>
