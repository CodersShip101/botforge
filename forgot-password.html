<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - VANTIS AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">VANTIS AI</a>
      <div class="nav-links">
        <a href="builder.html">Bot Builder</a>
        <a href="dashboard.html">My Bots</a>
        <a href="docs.html">Docs</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div style="max-width:420px;margin:60px auto">
      <h1 style="font-size:1.8rem;font-weight:700;margin-bottom:8px">Reset Password</h1>
      <p style="color:var(--text-muted);margin-bottom:24px">Enter your email to receive a password reset link.</p>
      <div id="alert-area"></div>
      <form id="forgot-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com">
        </div>
        <button type="submit" class="btn btn-primary btn-md" style="width:100%" id="submit-btn">Send Reset Link</button>
      </form>
      <p style="margin-top:16px;text-align:center;color:var(--text-muted);font-size:0.9rem">
        Remember your password? <a href="login.html">Sign In</a>
      </p>
    </div>
  </div>

  <script
    data-clerk-publishable-key="pk_test_Y2xlcmsuc2hpbmluZy1iaXJkLTQyLmNsZXJrLmFjY291bnRzLmRldiQ"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    crossorigin="anonymous"
    onload="initClerk()"
  ></script>
  <script src="js/app.js"></script>
  <script>
    let clerkReady = false;

    function initClerk() {
      window.Clerk.load({ publishableKey: 'pk_test_Y2xlcmsuc2hpbmluZy1iaXJkLTQyLmNsZXJrLmFjY291bnRzLmRldiQ' })
        .then(() => { clerkReady = true; })
        .catch(err => console.error('Clerk init error:', err));
    }

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!clerkReady) { showAlert('Loading, please wait...', 'info', document.getElementById('alert-area')); return; }
      const email = document.getElementById('email').value;
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        await window.Clerk.client.signIn.create({
          strategy: 'reset_password_email_code',
          identifier: email
        });
        showAlert('If this email is registered, a reset link has been sent.', 'success', document.getElementById('alert-area'));
      } catch (err) {
        showAlert('If this email is registered, a reset link has been sent.', 'success', document.getElementById('alert-area'));
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
