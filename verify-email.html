<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email - VANTIS AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-form { max-width:420px;margin:60px auto;text-align:center }
    .auth-form h1 { font-size:1.8rem;font-weight:700;margin-bottom:8px }
    .auth-form p.sub { color:var(--text-muted);margin-bottom:24px }
    .auth-card { background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;text-align:left }
    .spinner { border:3px solid rgba(0,224,255,0.2);border-radius:50%;border-top:3px solid var(--accent);width:36px;height:36px;animation:spin 1s linear infinite;margin:0 auto 16px }
    @keyframes spin { 0% { transform:rotate(0deg) } 100% { transform:rotate(360deg) } }
    .auth-error { background:rgba(255,59,59,0.1);border:1px solid var(--red);border-radius:8px;padding:10px 14px;color:var(--red);font-size:0.85rem;margin-bottom:16px;display:none }
    .auth-success { background:rgba(0,255,138,0.1);border:1px solid var(--green);border-radius:8px;padding:10px 14px;color:var(--green);font-size:0.85rem;margin-bottom:16px;display:none }
    .back-link { margin-top:16px;font-size:0.85rem }
    .back-link a { color:var(--accent);text-decoration:none }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">VANTIS AI</a>
      <div class="nav-links">
        <a href="builder.html">Bot Builder</a>
        <a href="dashboard.html">My Bots</a>
        <a href="docs.html">Docs</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="auth-form">
      <div class="spinner" id="spinner"></div>
      <h1 id="title">Verifying Email...</h1>
      <p class="sub" id="desc">Please wait while we verify your email address.</p>

      <div class="auth-card">
        <div class="auth-error" id="errorMsg"></div>
        <div class="auth-success" id="successMsg"></div>
        <div class="back-link" id="backLink" style="display:none">
          <a href="dashboard.html">&rarr; Continue to Dashboard</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    async function verifyEmail() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (!token) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('title').textContent = 'Verification Failed';
        document.getElementById('desc').textContent = '';
        document.getElementById('errorMsg').textContent = 'No verification token found. Check your email for the full link.';
        document.getElementById('errorMsg').style.display = 'block';
        return;
      }

      try {
        const data = await fetchAPI('/auth/verify-email', 'POST', { token });
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('title').textContent = 'Email Verified!';
        document.getElementById('desc').textContent = '';
        document.getElementById('successMsg').textContent = data.message;
        document.getElementById('successMsg').style.display = 'block';
        document.getElementById('backLink').style.display = 'block';
      } catch (err) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('title').textContent = 'Verification Failed';
        document.getElementById('desc').textContent = '';
        document.getElementById('errorMsg').textContent = err.message;
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('backLink').style.display = 'block';
      }
    }

    verifyEmail();
  </script>
</body>
</html>
