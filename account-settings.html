<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Settings - VANTIS AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .settings-layout { display:grid;grid-template-columns:220px 1fr;gap:32px;max-width:960px;margin:40px auto }
    .settings-nav { position:sticky;top:100px;display:flex;flex-direction:column;gap:4px }
    .settings-nav a { padding:10px 14px;border-radius:8px;color:var(--text-muted);font-size:0.9rem;text-decoration:none;transition:all .2s }
    .settings-nav a:hover { background:var(--bg-card);color:var(--text) }
    .settings-nav a.active { background:var(--accent);color:#fff;font-weight:600 }
    .settings-section { display:none }
    .settings-section.active { display:block }
    .settings-section h2 { font-size:1.4rem;font-weight:700;margin-bottom:8px }
    .settings-section p.sub { color:var(--text-muted);margin-bottom:24px;font-size:0.9rem }
    .info-row { display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border) }
    .info-row:last-child { border-bottom:none }
    .info-row .label { color:var(--text-muted);font-size:0.9rem }
    .info-row .value { font-weight:500 }
    .plan-card { background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;cursor:pointer;transition:all .2s }
    .plan-card:hover { border-color:var(--accent);transform:translateY(-2px) }
    .plan-card.selected { border-color:var(--accent);box-shadow:0 0 20px rgba(0,224,255,0.15) }
    .plan-card .plan-name { font-size:1.2rem;font-weight:700 }
    .plan-card .plan-price { font-size:1.8rem;font-weight:800;color:var(--accent);margin:8px 0 }
    .plan-card .plan-desc { color:var(--text-muted);font-size:0.85rem;margin-bottom:12px }
    .plan-features { list-style:none;padding:0;margin:0;font-size:0.85rem;color:var(--text) }
    .plan-features li { padding:4px 0 }
    .plan-features li::before { content:'✓ ';color:var(--green);font-weight:700 }
    .danger-zone { border:1px solid var(--red);border-radius:var(--radius);padding:24px;margin-top:24px }
    .danger-zone h3 { color:var(--red);margin-bottom:8px;font-size:1.1rem }
    .danger-zone p { color:var(--text-muted);font-size:0.85rem;margin-bottom:16px }
    .session-item { display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px }
    .session-item .device { font-weight:500 }
    .session-item .meta { font-size:0.8rem;color:var(--text-muted);margin-top:2px }
    .current-badge { font-size:0.75rem;background:var(--accent);color:#fff;padding:2px 8px;border-radius:4px;margin-left:8px }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">VANTIS AI</a>
      <div class="nav-links">
        <a href="builder.html">Bot Builder</a>
        <a href="dashboard.html">My Bots</a>
        <a href="docs.html">Docs</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div style="text-align:center;margin:60px auto;max-width:480px">
      <h1 style="font-size:1.8rem;font-weight:700;margin-bottom:8px">Account Settings</h1>
      <p style="color:var(--text-muted);margin-bottom:24px">
        VANTIS AI is running in offline mode. Account settings and plans require a server connection.
      </p>
      <a href="dashboard.html" class="btn btn-primary btn-md">Back to Dashboard</a>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
