<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Settings - VANTIS AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .settings-layout { display:grid;grid-template-columns:220px 1fr;gap:32px;max-width:960px;margin:40px auto }
    .settings-nav { position:sticky;top:100px;display:flex;flex-direction:column;gap:4px }
    .settings-nav a { padding:10px 14px;border-radius:8px;color:var(--text-muted);font-size:0.9rem;text-decoration:none;transition:all .2s }
    .settings-nav a:hover { background:var(--bg-card);color:var(--text) }
    .settings-nav a.active { background:var(--accent);color:#fff;font-weight:600 }
    .settings-section { display:none }
    .settings-section.active { display:block }
    .settings-section h2 { font-size:1.4rem;font-weight:700;margin-bottom:8px }
    .settings-section p.sub { color:var(--text-muted);margin-bottom:24px;font-size:0.9rem }
    .info-row { display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border) }
    .info-row:last-child { border-bottom:none }
    .info-row .label { color:var(--text-muted);font-size:0.9rem }
    .info-row .value { font-weight:500 }
    .plan-card { background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;cursor:pointer;transition:all .2s }
    .plan-card:hover { border-color:var(--accent);transform:translateY(-2px) }
    .plan-card.selected { border-color:var(--accent);box-shadow:0 0 20px rgba(0,224,255,0.15) }
    .plan-card .plan-name { font-size:1.2rem;font-weight:700 }
    .plan-card .plan-price { font-size:1.8rem;font-weight:800;color:var(--accent);margin:8px 0 }
    .plan-card .plan-desc { color:var(--text-muted);font-size:0.85rem;margin-bottom:12px }
    .plan-features { list-style:none;padding:0;margin:0;font-size:0.85rem;color:var(--text) }
    .plan-features li { padding:4px 0 }
    .plan-features li::before { content:'✓ ';color:var(--green);font-weight:700 }
    .danger-zone { border:1px solid var(--red);border-radius:var(--radius);padding:24px;margin-top:24px }
    .danger-zone h3 { color:var(--red);margin-bottom:8px;font-size:1.1rem }
    .danger-zone p { color:var(--text-muted);font-size:0.85rem;margin-bottom:16px }
    .btn { padding:10px 20px;border-radius:8px;border:none;font-family:inherit;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all .2s;display:inline-block;text-decoration:none }
    .btn-primary { background:var(--accent);color:#fff }
    .btn-primary:hover { filter:brightness(1.15) }
    .btn-danger { background:var(--red);color:#fff }
    .btn-danger:hover { filter:brightness(1.15) }
    .btn-sm { padding:6px 14px;font-size:0.8rem }
    .clerk-user-button { display:flex;justify-content:center;margin:20px 0 }
    #clerk-user-button .cl-userButtonPopoverCard { background:var(--bg-card);border:1px solid var(--border) }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">VANTIS AI</a>
      <div class="nav-links">
        <a href="builder.html">Bot Builder</a>
        <a href="dashboard.html">My Bots</a>
        <a href="docs.html">Docs</a>
      </div>
    </div>
  </nav>

  <div class="container" id="app">
    <div style="text-align:center;margin:60px auto;max-width:480px" id="loadingMsg">
      <p style="color:var(--text-muted)">Loading account settings...</p>
    </div>

    <div class="settings-layout" id="settingsLayout" style="display:none">
      <nav class="settings-nav">
        <a href="#" class="active" data-section="profile">Profile</a>
        <a href="#" data-section="plans">Plans & Billing</a>
        <a href="#" data-section="danger">Danger Zone</a>
      </nav>

      <div>
        <div class="settings-section active" id="section-profile">
          <h2>Profile</h2>
          <p class="sub">Your account is managed by Clerk</p>
          <div id="profileInfo"></div>
          <div class="clerk-user-button" id="clerk-user-button"></div>
        </div>

        <div class="settings-section" id="section-plans">
          <h2>Plans & Billing</h2>
          <p class="sub">Choose the plan that fits your needs</p>
          <div class="plans-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px" id="plansGrid"></div>
        </div>

        <div class="settings-section" id="section-danger">
          <div class="danger-zone">
            <h3>Danger Zone</h3>
            <p>Manage your account through Clerk's account portal.</p>
            <button class="btn btn-danger" id="manageAccountBtn">Manage Account</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script
    data-clerk-publishable-key="pk_test_dG91Y2hpbmctcGVsaWNhbi00MS5jbGVyay5hY2NvdW50cy5kZXYk"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@4/dist/clerk.browser.js"
    crossorigin="anonymous"
  ></script>
  <script src="js/app.js"></script>
  <script>
    const PLANS = [
      { id: 'free', name: 'Free', price: '$0', desc: 'Get started with basic bot building', features: ['1 bot', '3 backtests/day', 'Standard backtesting'] },
      { id: 'pro', name: 'Pro', price: '$29', desc: 'For serious algo traders', features: ['Unlimited bots', '50 backtests/day', 'AI Strategy Generator', 'Advanced backtesting'] },
      { id: 'elite', name: 'Elite', price: '$99', desc: 'Maximum power and flexibility', features: ['Unlimited bots', '200 backtests/day', 'AI Strategy Generator', 'Advanced backtesting', 'Priority support'] }
    ];

    async function loadSettings() {
      const loadingMsg = document.getElementById('loadingMsg');
      const settingsLayout = document.getElementById('settingsLayout');

      try {
        await window.Clerk.load();
      } catch {
        loadingMsg.innerHTML = '<p style="color:var(--text-muted)">Please <a href="login.html" style="color:var(--accent)">sign in</a> to manage your account.</p>';
        return;
      }

      if (!window.Clerk.user) {
        window.location.href = 'login.html';
        return;
      }

      const token = await window.Clerk.session?.getToken();
      if (!token) { loadingMsg.innerHTML = '<p>Session error. Please refresh.</p>'; return; }

      localStorage.setItem('vantis_token', token);
      const user = window.Clerk.user;
      localStorage.setItem('vantis_user', JSON.stringify({ id: user.id, email: user.primaryEmailAddress?.emailAddress, username: user.username }));

      loadingMsg.style.display = 'none';
      settingsLayout.style.display = '';

      document.getElementById('profileInfo').innerHTML = `
        <div class="info-row"><span class="label">Username</span><span class="value">${user.username || 'Not set'}</span></div>
        <div class="info-row"><span class="label">Email</span><span class="value">${user.primaryEmailAddress?.emailAddress || ''}</span></div>
        <div class="info-row"><span class="label">Email Verified</span><span class="value">${user.primaryEmailAddress?.verification?.status === 'verified' ? 'Yes' : 'No'}</span></div>
      `;

      window.Clerk.mountUserButton(document.getElementById('clerk-user-button'), {
        appearance: {
          elements: {
            userButtonPopoverCard: { background: 'var(--bg-card)', border: '1px solid var(--border)' },
            userButtonPopoverActionButton: { color: 'var(--text)' },
            userButtonPopoverActionButtonText: { color: 'var(--text)' },
            userPreviewMainIdentifier: { color: 'var(--text)' },
            userPreviewSecondaryIdentifier: { color: 'var(--text-muted)' },
          }
        }
      });

      document.getElementById('manageAccountBtn').addEventListener('click', () => {
        window.Clerk.openUserProfile();
      });

      await loadPlans(token);
    }

    async function loadPlans(token) {
      try {
        const res = await fetch('/api/auth/plan', { headers: { 'Authorization': `Bearer ${token}` } });
        if (!res.ok) throw new Error('Failed');
        const planData = await res.json();
        const currentPlan = planData.plan || 'free';
        document.getElementById('plansGrid').innerHTML = PLANS.map(p => `
          <div class="plan-card ${p.id === currentPlan ? 'selected' : ''}" onclick="upgradePlan('${p.id}')">
            <div class="plan-name">${p.name}</div>
            <div class="plan-price">${p.price}<span style="font-size:0.9rem;font-weight:400;color:var(--text-muted)">/mo</span></div>
            <div class="plan-desc">${p.desc}</div>
            <ul class="plan-features">${p.features.map(f => `<li>${f}</li>`).join('')}</ul>
            ${p.id === currentPlan ? '<div style="margin-top:12px;text-align:center;font-size:0.8rem;color:var(--accent);font-weight:600">Current Plan</div>' : ''}
          </div>
        `).join('');
      } catch { document.getElementById('plansGrid').innerHTML = '<p style="color:var(--text-muted)">Could not load plans.</p>'; }
    }

    async function upgradePlan(plan) {
      const token = await window.Clerk.session?.getToken();
      if (!token) return;
      try {
        const res = await fetch('/api/auth/plan/upgrade', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ plan })
        });
        if (!res.ok) throw new Error('Upgrade failed');
        await loadPlans(token);
      } catch {}
    }

    document.querySelectorAll('.settings-nav a').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('.settings-nav a').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.settings-section').forEach(x => x.classList.remove('active'));
        a.classList.add('active');
        document.getElementById('section-' + a.dataset.section).classList.add('active');
      });
    });

    document.addEventListener('DOMContentLoaded', loadSettings);
  </script>
</body>
</html>
