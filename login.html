<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - VANTIS AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    #clerk-sign-in {
      --clerk-font-family-headings: 'Space Grotesk', sans-serif;
      --clerk-font-family-body: 'Inter', sans-serif;
    }
    #clerk-sign-in .cl-card {
      background: transparent !important;
      box-shadow: none !important;
      padding: 0 !important;
    }
    #clerk-sign-in .cl-headerTitle {
      display: none;
    }
    #clerk-sign-in .cl-socialButtonsBlockRow {
      gap: 10px;
    }
    #clerk-sign-in .cl-socialButtonsIcon {
      width: 20px;
      height: 20px;
    }
    #clerk-sign-in .cl-internal-1dauvpw {
      display: none;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">VANTIS AI</a>
      <div class="nav-links">
        <a href="builder.html">Bot Builder</a>
        <a href="dashboard.html">My Bots</a>
        <a href="docs.html">Docs</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div style="max-width:420px;margin:60px auto">
      <h1 style="font-size:1.8rem;font-weight:700;margin-bottom:8px">Sign In</h1>
      <p style="color:var(--text-muted);margin-bottom:24px">Access your saved trading bots.</p>
      <div id="clerk-sign-in"></div>
      <p style="margin-top:16px;text-align:center;color:var(--text-muted);font-size:0.9rem">
        Don't have an account? <a href="register.html">Register</a>
      </p>
    </div>
  </div>

  <script
    data-clerk-publishable-key="pk_test_cmVzdGVkLWhhcmUtMzUuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    crossorigin="anonymous"
  ></script>
  <div id="clerk-fallback" style="display:none">
    <div class="social-divider">or sign in with email</div>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Enter password">
      </div>
      <div style="text-align:right;margin-bottom:16px">
        <a href="forgot-password.html" style="font-size:0.85rem;color:var(--text-muted)">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-md" style="width:100%" id="submit-btn">Sign In</button>
    </form>
  </div>
  <script>
    function setAlert(msg, type) {
      const el = document.createElement('div');
      el.className = 'alert alert-' + type;
      el.textContent = msg;
      document.getElementById('clerk-sign-in').appendChild(el);
    }

    (async () => {
      for (let i = 0; i < 50; i++) {
        if (window.Clerk) break;
        await new Promise(r => setTimeout(r, 200));
      }

      if (!window.Clerk) {
        console.error('Clerk SDK failed to load');
        document.getElementById('clerk-sign-in').innerHTML = '<p style="color:var(--text-muted)">Loading...</p>';
        document.getElementById('clerk-fallback').style.display = 'block';
        return;
      }

      try {
        await window.Clerk.load();
        console.log('Clerk loaded, user:', !!window.Clerk.user);

        if (window.Clerk.user) {
          window.location.href = 'dashboard.html';
          return;
        }

        if (typeof window.Clerk.openSignIn === 'function') {
          document.getElementById('clerk-sign-in').innerHTML =
            '<p style="color:var(--text-muted);text-align:center">Loading sign-in...</p>';
          await window.Clerk.openSignIn({ afterSignInUrl: '/dashboard.html' });
          if (window.Clerk.user) {
            window.location.href = 'dashboard.html';
          }
          return;
        }

        if (typeof window.Clerk.mountSignIn === 'function') {
          await window.Clerk.mountSignIn(document.getElementById('clerk-sign-in'), {
            afterSignInUrl: '/dashboard.html',
            signUpUrl: '/register.html',
            appearance: {
              variables: {
                colorPrimary: '#00E0FF', colorBackground: 'transparent',
                colorInputBackground: 'rgba(26,26,31,0.8)', colorInputText: '#ffffff',
                colorText: '#ffffff', colorTextSecondary: '#7A9CFF',
                colorDanger: '#FF3B3B', colorSuccess: '#00FF8A',
                fontFamily: 'Inter, sans-serif', fontFamilyHeadings: 'Space Grotesk, sans-serif',
              },
              elements: {
                card: { boxShadow: 'none', padding: '0', background: 'transparent' },
                headerTitle: { display: 'none' }, headerSubtitle: { display: 'none' },
                dividerLine: { background: 'rgba(0,224,255,0.2)' }, dividerText: { color: '#7A9CFF' },
                socialButtonsBlockButton: {
                  background: 'rgba(0,224,255,0.1)', border: '1px solid rgba(0,224,255,0.5)',
                  color: '#00E0FF', borderRadius: '8px', fontSize: '0.9rem',
                  fontWeight: '500', padding: '0.65rem 1rem',
                },
                socialButtonsBlockButtonArrow: { display: 'none' },
                formFieldLabel: { color: '#7A9CFF', fontSize: '0.85rem' },
                formFieldInput: {
                  background: 'rgba(26,26,31,0.8)', border: '1px solid rgba(0,224,255,0.3)',
                  borderRadius: '6px', color: '#ffffff', padding: '0.65rem 0.75rem',
                },
                formButtonPrimary: {
                  background: '#00E0FF', color: '#0D0D0F', fontWeight: '600',
                  borderRadius: '8px', padding: '0.65rem 1rem', fontSize: '0.95rem',
                },
                footerAction: { display: 'none' }, footer: { display: 'none' },
                identityPreviewEditButton: { color: '#00E0FF' },
                formFieldAction: { color: '#00E0FF' }, backLink: { color: '#00E0FF' },
              },
            },
          });
          return;
        }

        document.getElementById('clerk-fallback').style.display = 'block';
        setAlert('Clerk UI not available. Use email/password below.', 'info');
      } catch (err) {
        console.error('Clerk error:', err);
        document.getElementById('clerk-sign-in').innerHTML = '';
        document.getElementById('clerk-fallback').style.display = 'block';
        setAlert('Could not load sign-in component. Use email/password below.', 'info');
      }
    })();

    document.addEventListener('click', async (e) => {
      const btn = e.target.closest('#submit-btn');
      if (!btn) return;
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        if (!window.Clerk) throw new Error('Clerk not loaded');
        const signIn = await window.Clerk.client.signIn.create({ identifier: email, password });
        if (signIn.status === 'complete') {
          await window.Clerk.setActive({ session: signIn.createdSessionId });
          window.location.href = 'dashboard.html';
        }
      } catch (err) {
        setAlert(err.errors?.[0]?.message || err.message || 'Sign in failed', 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
