<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - VANTIS AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    #clerk-sign-in {
      --clerk-font-family-headings: 'Space Grotesk', sans-serif;
      --clerk-font-family-body: 'Inter', sans-serif;
    }
    #clerk-sign-in .cl-card {
      background: transparent !important;
      box-shadow: none !important;
      padding: 0 !important;
    }
    #clerk-sign-in .cl-headerTitle { display: none; }
    #clerk-sign-in .cl-socialButtonsBlockRow { gap: 10px; }
    #clerk-sign-in .cl-socialButtonsIcon { width: 20px; height: 20px; }
    #clerk-sign-in .cl-internal-1dauvpw { display: none; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">VANTIS AI</a>
      <div class="nav-links">
        <a href="builder.html">Bot Builder</a>
        <a href="dashboard.html">My Bots</a>
        <a href="docs.html">Docs</a>
        <a href="register.html" class="btn btn-primary btn-sm">Get Started</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div style="max-width:420px;margin:60px auto;text-align:center">
      <h1 style="font-size:1.8rem;font-weight:700;margin-bottom:8px">Sign In</h1>
      <p style="color:var(--text-muted);margin-bottom:24px">Access your saved trading bots.</p>
      <div id="clerk-sign-in"></div>
      <p style="margin-top:16px;color:var(--text-muted);font-size:0.9rem">
        Don't have an account? <a href="register.html" style="color:var(--accent);text-decoration:none">Register</a>
      </p>
    </div>
  </div>

  <script
    data-clerk-publishable-key="pk_test_YWxsb3dpbmcteWV0aS04OC5jbGVyay5hY2NvdW50cy5kZXYk"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    crossorigin="anonymous"
  ></script>
  <script>
    (async () => {
      try {
        await window.Clerk.load();

        if (window.Clerk.user) {
          await syncClerkUser();
          window.location.href = 'dashboard.html';
          return;
        }

        await window.Clerk.mountSignIn(document.getElementById('clerk-sign-in'), {
          afterSignInUrl: '/dashboard.html',
          signUpUrl: '/register.html',
          appearance: {
            variables: {
              colorPrimary: '#00E0FF',
              colorBackground: 'transparent',
              colorInputBackground: 'rgba(26, 26, 31, 0.8)',
              colorInputText: '#ffffff',
              colorText: '#ffffff',
              colorTextSecondary: '#7A9CFF',
              colorDanger: '#FF3B3B',
              colorSuccess: '#00FF8A',
              fontFamily: 'Inter, sans-serif',
              fontFamilyHeadings: 'Space Grotesk, sans-serif',
            },
            elements: {
              card: { boxShadow: 'none', padding: '0', background: 'transparent' },
              headerTitle: { display: 'none' },
              headerSubtitle: { display: 'none' },
              dividerLine: { background: 'rgba(0, 224, 255, 0.2)' },
              dividerText: { color: '#7A9CFF' },
              socialButtonsBlockButton: {
                background: 'rgba(0, 224, 255, 0.1)',
                border: '1px solid rgba(0, 224, 255, 0.5)',
                color: '#00E0FF',
                borderRadius: '8px',
                fontSize: '0.9rem',
                fontWeight: '500',
                padding: '0.65rem 1rem',
              },
              socialButtonsBlockButtonArrow: { display: 'none' },
              formFieldLabel: { color: '#7A9CFF', fontSize: '0.85rem' },
              formFieldInput: {
                background: 'rgba(26, 26, 31, 0.8)',
                border: '1px solid rgba(0, 224, 255, 0.3)',
                borderRadius: '6px',
                color: '#ffffff',
                padding: '0.65rem 0.75rem',
              },
              formButtonPrimary: {
                background: '#00E0FF',
                color: '#0D0D0F',
                fontWeight: '600',
                borderRadius: '8px',
                padding: '0.65rem 1rem',
                fontSize: '0.95rem',
              },
              footerAction: { display: 'none' },
              footer: { display: 'none' },
              identityPreviewEditButton: { color: '#00E0FF' },
              formFieldAction: { color: '#00E0FF' },
              backLink: { color: '#00E0FF' },
            },
          },
        });
      } catch (err) {
        console.error('Clerk error:', err);
        document.getElementById('clerk-sign-in').innerHTML =
          '<div class="alert alert-error">Failed to load sign-in. Please try again later.</div>';
      }
    })();

    async function syncClerkUser() {
      const token = await window.Clerk.session?.getToken();
      if (!token) return;
      try {
        const user = window.Clerk.user;
        await fetch('/api/auth/sync', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: user.id, email: user.primaryEmailAddress?.emailAddress, username: user.username })
        });
      } catch (e) { console.error('Sync error:', e); }
    }
  </script>
</body>
</html>
