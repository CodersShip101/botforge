<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password - VANTIS AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">VANTIS AI</a>
      <div class="nav-links">
        <a href="builder.html">Bot Builder</a>
        <a href="dashboard.html">My Bots</a>
        <a href="docs.html">Docs</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div style="max-width:420px;margin:60px auto">
      <h1 style="font-size:1.8rem;font-weight:700;margin-bottom:8px">Set New Password</h1>
      <p style="color:var(--text-muted);margin-bottom:24px">Enter the code from your email and a new password.</p>
      <div id="alert-area"></div>
      <form id="reset-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="code">Verification Code</label>
          <input type="text" id="code" name="code" required placeholder="Code from email">
        </div>
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" name="password" required minlength="8" placeholder="At least 8 characters">
        </div>
        <button type="submit" class="btn btn-primary btn-md" style="width:100%" id="submit-btn">Reset Password</button>
      </form>
      <div id="reset-success" style="display:none">
        <div style="background:var(--bg-card);border:1px solid var(--green);border-radius:var(--radius);padding:32px;text-align:center">
          <h3 style="color:var(--green);margin-bottom:12px">Password Reset Successful</h3>
          <p style="color:var(--text-muted);margin-bottom:20px">Your password has been updated. Sign in with your new password.</p>
          <a href="login.html" class="btn btn-primary btn-md">Sign In</a>
        </div>
      </div>
    </div>
  </div>

  <script
    data-clerk-publishable-key="pk_test_cmVzdGVkLWhhcmUtMzUuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    crossorigin="anonymous"
  ></script>
  <script>
    let clerkReady = false;

    (async () => {
      for (let i = 0; i < 50; i++) {
        if (window.Clerk) break;
        await new Promise(r => setTimeout(r, 200));
      }
      if (window.Clerk) {
        try {
          await window.Clerk.load();
          clerkReady = true;
        } catch (err) { console.error('Clerk init error:', err); }
      }
    })();

    function showAlert(msg, type, area) {
      area.innerHTML = '';
      const el = document.createElement('div');
      el.className = 'alert alert-' + type;
      el.textContent = msg;
      area.appendChild(el);
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('email')) {
      document.getElementById('email').value = params.get('email');
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!clerkReady) { showAlert('Loading, please wait...', 'info', document.getElementById('alert-area')); return; }
      const code = document.getElementById('code').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Resetting...';

      try {
        const signIn = await window.Clerk.client.signIn.create({
          strategy: 'reset_password_email_code',
          code,
          password
        });
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('reset-success').style.display = 'block';
      } catch (err) {
        showAlert(err.errors?.[0]?.message || err.message || 'Invalid code or expired', 'error', document.getElementById('alert-area'));
      } finally {
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
