<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - VANTIS AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .otp-container {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 20px 0;
    }
    .otp-box {
      width: 48px;
      height: 56px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      background: rgba(26, 26, 31, 0.8);
      border: 2px solid rgba(0, 224, 255, 0.3);
      border-radius: 8px;
      color: #ffffff;
      outline: none;
      transition: border-color 0.2s;
    }
    .otp-box:focus {
      border-color: #00E0FF;
    }
    .otp-box.filled {
      border-color: #00E0FF;
    }
    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .step-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(0, 224, 255, 0.2);
      transition: background 0.3s;
    }
    .step-dot.active {
      background: #00E0FF;
    }
    .step-dot.done {
      background: #00FF8A;
    }
    .step { display: none; }
    .step.active { display: block; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">VANTIS AI</a>
      <div class="nav-links">
        <a href="builder.html">Bot Builder</a>
        <a href="dashboard.html">My Bots</a>
        <a href="docs.html">Docs</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div style="max-width:420px;margin:60px auto">
      <h1 style="font-size:1.8rem;font-weight:700;margin-bottom:8px">Reset Password</h1>
      <p id="step-desc" style="color:var(--text-muted);margin-bottom:24px">Enter your email to receive a reset code.</p>

      <div class="step-indicator">
        <div class="step-dot active" data-step="0"></div>
        <div class="step-dot" data-step="1"></div>
        <div class="step-dot" data-step="2"></div>
      </div>

      <div id="alert-area"></div>

      <!-- Step 0: Email -->
      <div class="step active" data-step="0">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <button class="btn btn-primary btn-md" style="width:100%" id="send-code-btn">Send Reset Code</button>
      </div>

      <!-- Step 1: OTP -->
      <div class="step" data-step="1">
        <p style="color:var(--text-muted);text-align:center;margin-bottom:16px">
          Enter the 6-digit code sent to <strong id="otp-email" style="color:var(--text)"></strong>
        </p>
        <div class="otp-container" id="otp-container">
          <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" autofocus>
          <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
          <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
          <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
          <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
          <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary btn-md" style="flex:1" id="back-email-btn">Back</button>
          <button class="btn btn-primary btn-md" style="flex:1" id="verify-code-btn" disabled>Verify Code</button>
        </div>
      </div>

      <!-- Step 2: New Password -->
      <div class="step" data-step="2">
        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" required minlength="8" placeholder="At least 8 characters">
          <div style="margin-top:6px;height:4px;background:var(--border);border-radius:2px;overflow:hidden">
            <div id="strength-bar" style="height:100%;width:0;border-radius:2px;transition:all 0.3s"></div>
          </div>
          <p id="strength-text" style="font-size:0.75rem;color:var(--text-muted);margin-top:4px"></p>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" required minlength="8" placeholder="Re-enter your password">
          <p id="match-text" style="font-size:0.75rem;margin-top:4px"></p>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary btn-md" style="flex:1" id="back-otp-btn">Back</button>
          <button class="btn btn-primary btn-md" style="flex:1" id="reset-password-btn" disabled>Reset Password</button>
        </div>
      </div>

      <!-- Success -->
      <div id="reset-success" style="display:none">
        <div style="background:var(--bg-card);border:1px solid var(--green);border-radius:var(--radius);padding:32px;text-align:center">
          <h3 style="color:var(--green);margin-bottom:12px">Password Reset Successful</h3>
          <p style="color:var(--text-muted);margin-bottom:20px">Your password has been updated. Sign in with your new password.</p>
          <a href="login.html" class="btn btn-primary btn-md">Sign In</a>
        </div>
      </div>
    </div>
  </div>

  <script
    data-clerk-publishable-key="pk_test_cmVzdGVkLWhhcmUtMzUuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    crossorigin="anonymous"
  ></script>
  <script>
    let clerkReady = false;
    let currentSignIn = null;
    let userEmail = '';

    (async () => {
      for (let i = 0; i < 50; i++) {
        if (window.Clerk) break;
        await new Promise(r => setTimeout(r, 200));
      }
      if (window.Clerk) {
        try {
          await window.Clerk.load();
          clerkReady = true;
        } catch (err) { console.error('Clerk init error:', err); }
      }

      const params = new URLSearchParams(window.location.search);
      if (params.get('email')) {
        document.getElementById('email').value = params.get('email');
      }
    })();

    function showAlert(msg, type) {
      const area = document.getElementById('alert-area');
      area.innerHTML = '';
      if (!msg) return;
      const el = document.createElement('div');
      el.className = 'alert alert-' + type;
      el.textContent = msg;
      area.appendChild(el);
    }

    function goToStep(n) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.querySelector(`.step[data-step="${n}"]`).classList.add('active');
      document.querySelectorAll('.step-dot').forEach(d => {
        const i = parseInt(d.dataset.step);
        d.classList.toggle('active', i === n);
        d.classList.toggle('done', i < n);
      });
      const descs = [
        'Enter your email to receive a reset code.',
        'Enter the 6-digit code sent to your email.',
        'Choose a new password.'
      ];
      document.getElementById('step-desc').textContent = descs[n];
      showAlert(null);
    }

    // Step 0: Send code
    document.getElementById('send-code-btn').addEventListener('click', async () => {
      if (!clerkReady) { showAlert('Clerk is loading, please wait...', 'info'); return; }
      const email = document.getElementById('email').value.trim();
      if (!email) { showAlert('Please enter your email address.', 'error'); return; }
      userEmail = email;
      const btn = document.getElementById('send-code-btn');
      btn.disabled = true; btn.textContent = 'Sending...';

      try {
        currentSignIn = await window.Clerk.client.signIn.create({
          strategy: 'reset_password_email_code',
          identifier: email
        });
        document.getElementById('otp-email').textContent = email;
        goToStep(1);
        document.querySelector('.otp-box').focus();
      } catch (err) {
        showAlert(err.errors?.[0]?.message || 'Failed to send code. Try again.', 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Send Reset Code';
      }
    });

    // OTP auto-advance
    const otpBoxes = document.querySelectorAll('.otp-box');
    otpBoxes.forEach((box, i) => {
      box.addEventListener('input', () => {
        box.value = box.value.replace(/\D/g, '');
        box.classList.toggle('filled', box.value.length === 1);
        if (box.value.length === 1 && i < otpBoxes.length - 1) {
          otpBoxes[i + 1].focus();
        }
        updateVerifyBtn();
      });
      box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !box.value && i > 0) {
          otpBoxes[i - 1].focus();
          otpBoxes[i - 1].value = '';
          otpBoxes[i - 1].classList.remove('filled');
          updateVerifyBtn();
        }
        if (e.key === 'Enter' && i === otpBoxes.length - 1) {
          document.getElementById('verify-code-btn').click();
        }
      });
      box.addEventListener('focus', () => box.select());
    });

    function getOTP() {
      return Array.from(otpBoxes).map(b => b.value).join('');
    }

    function updateVerifyBtn() {
      document.getElementById('verify-code-btn').disabled = getOTP().length !== 6;
    }

    // Step 1: Verify code
    document.getElementById('verify-code-btn').addEventListener('click', async () => {
      if (!clerkReady || !currentSignIn) return;
      const code = getOTP();
      if (code.length !== 6) { showAlert('Please enter the full 6-digit code.', 'error'); return; }
      const btn = document.getElementById('verify-code-btn');
      btn.disabled = true; btn.textContent = 'Verifying...';
      showAlert(null);

      try {
        const result = await currentSignIn.attemptFirstFactor({
          strategy: 'reset_password_email_code',
          code
        });
        goToStep(2);
        document.getElementById('new-password').focus();
      } catch (err) {
        otpBoxes.forEach(b => { b.value = ''; b.classList.remove('filled'); });
        otpBoxes[0].focus();
        updateVerifyBtn();
        showAlert(err.errors?.[0]?.message || 'Invalid code. Try again.', 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Verify Code';
      }
    });

    // Back buttons
    document.getElementById('back-email-btn').addEventListener('click', () => goToStep(0));
    document.getElementById('back-otp-btn').addEventListener('click', () => { goToStep(1); otpBoxes[0].focus(); });

    // Password strength
    function checkStrength(password) {
      let score = 0;
      if (password.length >= 8) score += 20;
      if (password.length >= 12) score += 20;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score += 20;
      if (/[0-9]/.test(password)) score += 20;
      if (/[^a-zA-Z0-9]/.test(password)) score += 20;
      return score;
    }

    function updatePasswordUI() {
      const pwd = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      const score = checkStrength(pwd);
      const bar = document.getElementById('strength-bar');
      const text = document.getElementById('strength-text');
      bar.style.width = score + '%';
      if (!pwd) { text.textContent = ''; }
      else if (score < 40) { bar.style.background = 'var(--red)'; text.textContent = 'Weak'; text.style.color = 'var(--red)'; }
      else if (score < 80) { bar.style.background = '#FFA500'; text.textContent = 'Medium'; text.style.color = '#FFA500'; }
      else { bar.style.background = 'var(--green)'; text.textContent = 'Strong'; text.style.color = 'var(--green)'; }

      const matchText = document.getElementById('match-text');
      if (!confirm) { matchText.textContent = ''; }
      else if (pwd === confirm) { matchText.textContent = 'Passwords match'; matchText.style.color = 'var(--green)'; }
      else { matchText.textContent = 'Passwords do not match'; matchText.style.color = 'var(--red)'; }

      document.getElementById('reset-password-btn').disabled =
        !pwd || !confirm || pwd !== confirm || score < 40;
    }

    document.getElementById('new-password').addEventListener('input', updatePasswordUI);
    document.getElementById('confirm-password').addEventListener('input', updatePasswordUI);

    // Step 2: Reset password
    document.getElementById('reset-password-btn').addEventListener('click', async () => {
      if (!clerkReady || !currentSignIn) return;
      const password = document.getElementById('new-password').value;
      const btn = document.getElementById('reset-password-btn');
      btn.disabled = true; btn.textContent = 'Resetting...';
      showAlert(null);

      try {
        await currentSignIn.resetPassword({ password });
        document.querySelector('.step-indicator').style.display = 'none';
        document.getElementById('step-desc').style.display = 'none';
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('reset-success').style.display = 'block';
      } catch (err) {
        showAlert(err.errors?.[0]?.message || 'Failed to reset password.', 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
