<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - VANTIS AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">VANTIS AI</a>
      <div class="nav-links">
        <a href="builder.html">Bot Builder</a>
        <a href="dashboard.html">My Bots</a>
        <a href="docs.html">Docs</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div style="max-width:420px;margin:60px auto">
      <h1 style="font-size:1.8rem;font-weight:700;margin-bottom:8px">Create Account</h1>
      <p style="color:var(--text-muted);margin-bottom:24px">Free. No coding. Start building AI trading bots.</p>
      <div id="alert-area" style="position:relative;min-height:0"></div>

      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">
        <button class="social-btn social-btn-google" onclick="clerkOAuth('oauth_google')" id="btn-google">
          <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#EA4335" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#4285F4" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#34A853" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
        <button class="social-btn social-btn-microsoft" onclick="clerkOAuth('oauth_microsoft')" id="btn-microsoft">
          <svg width="20" height="20" viewBox="0 0 23 23"><rect x="1" y="1" width="10" height="10" fill="#F25022"/><rect x="12" y="1" width="10" height="10" fill="#7FBA00"/><rect x="1" y="12" width="10" height="10" fill="#00A4EF"/><rect x="12" y="12" width="10" height="10" fill="#FFB900"/></svg>
          Continue with Microsoft
        </button>
        <button class="social-btn social-btn-apple" onclick="clerkOAuth('oauth_apple')" id="btn-apple">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          Continue with Apple
        </button>
      </div>

      <div class="social-divider">or sign up with email</div>

      <form id="register-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required placeholder="Choose a username">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="8" placeholder="At least 8 characters">
          <div id="password-strength" style="margin-top:6px;height:4px;background:var(--border);border-radius:2px;overflow:hidden">
            <div id="strength-bar" style="height:100%;width:0;border-radius:2px;transition:all 0.3s"></div>
          </div>
          <p id="strength-text" style="font-size:0.75rem;color:var(--text-muted);margin-top:4px"></p>
        </div>
        <button type="submit" class="btn btn-primary btn-md" style="width:100%" id="submit-btn">Create Account</button>
      </form>
      <p style="margin-top:16px;text-align:center;color:var(--text-muted);font-size:0.9rem">
        Already have an account? <a href="login.html">Sign In</a>
      </p>
    </div>
  </div>

  <script
    data-clerk-publishable-key="pk_test_cmVzdGVkLWhhcmUtMzUuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    crossorigin="anonymous"
  ></script>
  <script src="js/app.js"></script>
  <script>
    let clerkReady = false;
    let clerkLoadAttempted = false;

    async function initClerk() {
      if (clerkLoadAttempted) return;
      clerkLoadAttempted = true;
      try {
        const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 5000));
        await Promise.race([window.Clerk.load(), timeout]);
        clerkReady = true;
      } catch (err) {
        console.error('Clerk init error:', err);
        const area = document.getElementById('alert-area');
        area.innerHTML = '<div class="alert alert-error">Clerk failed to initialize. Make sure you have a valid Clerk publishable key configured in the Clerk Dashboard.</div>';
      }
    }

    setTimeout(initClerk, 100);

    function setAlert(msg, type) {
      const area = document.getElementById('alert-area');
      area.innerHTML = '';
      const el = document.createElement('div');
      el.className = 'alert alert-' + type;
      el.textContent = msg;
      area.appendChild(el);
    }

    async function clerkOAuth(strategy) {
      if (!clerkReady) { return initClerk().then(() => clerkOAuth(strategy)); }
      try {
        const origOpen = window.open;
        window.open = function(url, target, features) {
          window.open = origOpen;
          window.location.href = url;
          return null;
        };
        await window.Clerk.client.signUp.authenticateWithRedirect({
          strategy,
          redirectUrl: window.location.origin + '/oauth-callback.html'
        });
        window.open = origOpen;
      } catch (err) {
        setAlert('Social sign up failed: ' + (err.message || 'Unknown error'), 'error');
      }
    }

    function checkStrength(password) {
      let score = 0;
      if (password.length >= 8) score += 20;
      if (password.length >= 12) score += 20;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score += 20;
      if (/[0-9]/.test(password)) score += 20;
      if (/[^a-zA-Z0-9]/.test(password)) score += 20;
      return score;
    }

    document.getElementById('password').addEventListener('input', function() {
      const score = checkStrength(this.value);
      const bar = document.getElementById('strength-bar');
      const text = document.getElementById('strength-text');
      bar.style.width = score + '%';
      if (score < 40) { bar.style.background = 'var(--red)'; text.textContent = 'Weak'; text.style.color = 'var(--red)'; }
      else if (score < 80) { bar.style.background = '#FFA500'; text.textContent = 'Medium'; text.style.color = '#FFA500'; }
      else { bar.style.background = 'var(--green)'; text.textContent = 'Strong'; text.style.color = 'var(--green)'; }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!clerkReady) { return initClerk().then(() => document.getElementById('register-form').dispatchEvent(new Event('submit'))); }
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const signUp = await window.Clerk.client.signUp.create({ emailAddress: email, password, username });
        if (signUp.status === 'complete') {
          await window.Clerk.setActive({ session: signUp.createdSessionId });
          window.location.href = 'dashboard.html';
        } else {
          setAlert('Please check your email to verify your account.', 'info');
        }
      } catch (err) {
        setAlert(err.errors?.[0]?.message || err.message || 'Registration failed', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
