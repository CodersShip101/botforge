<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - VANTIS AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    #clerk-sign-up {
      --clerk-font-family-headings: 'Space Grotesk', sans-serif;
      --clerk-font-family-body: 'Inter', sans-serif;
    }
    #clerk-sign-up .cl-card {
      background: transparent !important;
      box-shadow: none !important;
      padding: 0 !important;
    }
    #clerk-sign-up .cl-headerTitle {
      display: none;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">VANTIS AI</a>
      <div class="nav-links">
        <a href="builder.html">Bot Builder</a>
        <a href="dashboard.html">My Bots</a>
        <a href="docs.html">Docs</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div style="max-width:420px;margin:60px auto">
      <h1 style="font-size:1.8rem;font-weight:700;margin-bottom:8px">Create Account</h1>
      <p style="color:var(--text-muted);margin-bottom:24px">Free. No coding. Start building AI trading bots.</p>
      <div id="clerk-sign-up"></div>
      <div id="clerk-fallback" style="display:none">
        <div class="social-divider">or sign up with email</div>
        <form id="register-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="Choose a username">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="you@example.com">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="8" placeholder="At least 8 characters">
            <div id="password-strength" style="margin-top:6px;height:4px;background:var(--border);border-radius:2px;overflow:hidden">
              <div id="strength-bar" style="height:100%;width:0;border-radius:2px;transition:all 0.3s"></div>
            </div>
            <p id="strength-text" style="font-size:0.75rem;color:var(--text-muted);margin-top:4px"></p>
          </div>
          <button type="submit" class="btn btn-primary btn-md" style="width:100%" id="submit-btn">Create Account</button>
        </form>
      </div>
      <p style="margin-top:16px;text-align:center;color:var(--text-muted);font-size:0.9rem">
        Already have an account? <a href="login.html">Sign In</a>
      </p>
    </div>
  </div>

  <script
    data-clerk-publishable-key="pk_test_cmVzdGVkLWhhcmUtMzUuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    crossorigin="anonymous"
  ></script>
  <script>
    function setAlert(msg, type) {
      const el = document.createElement('div');
      el.className = 'alert alert-' + type;
      el.textContent = msg;
      document.getElementById('clerk-sign-up').appendChild(el);
    }

    function checkStrength(password) {
      let score = 0;
      if (password.length >= 8) score += 20;
      if (password.length >= 12) score += 20;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score += 20;
      if (/[0-9]/.test(password)) score += 20;
      if (/[^a-zA-Z0-9]/.test(password)) score += 20;
      return score;
    }

    (async () => {
      for (let i = 0; i < 50; i++) {
        if (window.Clerk) break;
        await new Promise(r => setTimeout(r, 200));
      }

      if (!window.Clerk) {
        console.error('Clerk SDK failed to load');
        document.getElementById('clerk-sign-up').innerHTML = '<p style="color:var(--text-muted)">Loading...</p>';
        document.getElementById('clerk-fallback').style.display = 'block';
        return;
      }

      try {
        await window.Clerk.load();
        console.log('Clerk loaded, user:', !!window.Clerk.user);

        if (window.Clerk.user) {
          window.location.href = 'dashboard.html';
          return;
        }

        if (typeof window.Clerk.openSignUp === 'function') {
          document.getElementById('clerk-sign-up').innerHTML =
            '<p style="color:var(--text-muted);text-align:center">Loading sign-up...</p>';
          await window.Clerk.openSignUp({ afterSignUpUrl: '/dashboard.html' });
          if (window.Clerk.user) {
            window.location.href = 'dashboard.html';
          }
          return;
        }

        if (typeof window.Clerk.mountSignUp === 'function') {
          await window.Clerk.mountSignUp(document.getElementById('clerk-sign-up'), {
            afterSignUpUrl: '/dashboard.html',
            signInUrl: '/login.html',
            appearance: {
              variables: {
                colorPrimary: '#00E0FF', colorBackground: 'transparent',
                colorInputBackground: 'rgba(26,26,31,0.8)', colorInputText: '#ffffff',
                colorText: '#ffffff', colorTextSecondary: '#7A9CFF',
                colorDanger: '#FF3B3B', colorSuccess: '#00FF8A',
                fontFamily: 'Inter, sans-serif', fontFamilyHeadings: 'Space Grotesk, sans-serif',
              },
              elements: {
                card: { boxShadow: 'none', padding: '0', background: 'transparent' },
                headerTitle: { display: 'none' }, headerSubtitle: { display: 'none' },
                dividerLine: { background: 'rgba(0,224,255,0.2)' }, dividerText: { color: '#7A9CFF' },
                socialButtonsBlockButton: {
                  background: 'rgba(0,224,255,0.1)', border: '1px solid rgba(0,224,255,0.5)',
                  color: '#00E0FF', borderRadius: '8px', fontSize: '0.9rem',
                  fontWeight: '500', padding: '0.65rem 1rem',
                },
                socialButtonsBlockButtonArrow: { display: 'none' },
                formFieldLabel: { color: '#7A9CFF', fontSize: '0.85rem' },
                formFieldInput: {
                  background: 'rgba(26,26,31,0.8)', border: '1px solid rgba(0,224,255,0.3)',
                  borderRadius: '6px', color: '#ffffff', padding: '0.65rem 0.75rem',
                },
                formButtonPrimary: {
                  background: '#00E0FF', color: '#0D0D0F', fontWeight: '600',
                  borderRadius: '8px', padding: '0.65rem 1rem', fontSize: '0.95rem',
                },
                footerAction: { display: 'none' }, footer: { display: 'none' },
                identityPreviewEditButton: { color: '#00E0FF' },
                formFieldAction: { color: '#00E0FF' }, backLink: { color: '#00E0FF' },
              },
            },
          });
          return;
        }

        document.getElementById('clerk-fallback').style.display = 'block';
        setAlert('Clerk UI not available. Use email/password below.', 'info');
      } catch (err) {
        console.error('Clerk error:', err);
        document.getElementById('clerk-sign-up').innerHTML = '';
        document.getElementById('clerk-fallback').style.display = 'block';
        setAlert('Could not load sign-up component. Use email/password below.', 'info');
      }
    })();

    document.getElementById('password').addEventListener('input', function() {
      const score = checkStrength(this.value);
      const bar = document.getElementById('strength-bar');
      const text = document.getElementById('strength-text');
      bar.style.width = score + '%';
      if (score < 40) { bar.style.background = 'var(--red)'; text.textContent = 'Weak'; text.style.color = 'var(--red)'; }
      else if (score < 80) { bar.style.background = '#FFA500'; text.textContent = 'Medium'; text.style.color = '#FFA500'; }
      else { bar.style.background = 'var(--green)'; text.textContent = 'Strong'; text.style.color = 'var(--green)'; }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        if (!window.Clerk) throw new Error('Clerk not loaded');
        const signUp = await window.Clerk.client.signUp.create({ emailAddress: email, password, username });
        if (signUp.status === 'complete') {
          await window.Clerk.setActive({ session: signUp.createdSessionId });
          window.location.href = 'dashboard.html';
        } else {
          setAlert('Please check your email to verify your account.', 'info');
        }
      } catch (err) {
        setAlert(err.errors?.[0]?.message || err.message || 'Registration failed', 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
