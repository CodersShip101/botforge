<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot Builder - VANTIS AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">VANTIS AI</a>
      <div class="nav-links">
        <a href="builder.html">Bot Builder</a>
        <a href="dashboard.html">My Bots</a>
        <a href="docs.html">Docs</a>
      </div>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@4/dist/clerk.browser.js" data-clerk-publishable-key="pk_test_dG91Y2hpbmctcGVsaWNhbi00MS5jbGVyay5hY2NvdW50cy5kZXYk" crossorigin="anonymous"></script>
  <script src="js/app.js"></script>
  <script>
    (async () => {
      try { await window.Clerk?.load(); } catch {}
      if (window.Clerk?.user) { renderProfileDropdown(); }
    })();
  </script>

  <div class="container">
    <div class="page-header">
      <h1>Bot Builder</h1>
      <p>Configure your trading bot in a few steps, then download the MQL code.</p>
    </div>

    <div class="builder-layout">
      <aside class="builder-sidebar" id="sidebar-steps"></aside>
      <main class="builder-main">
        <div id="step-content"></div>
      </main>
    </div>
  </div>

  <!-- AI Assist Modal -->
  <div class="modal-overlay" id="ai-modal">
    <div class="modal" style="max-width:600px">
      <button class="modal-close" onclick="closeAIModal()">&times;</button>
      <h2>AI Strategy Generator</h2>
      <p>Describe your trading strategy in natural language. VANTIS AI will analyze your requirements and generate an optimal configuration.</p>
      <div class="form-group">
        <label for="ai-prompt">Describe your strategy</label>
        <textarea id="ai-prompt" rows="3" placeholder="e.g. I want a trend-following bot that uses RSI and EMA crossover on EURUSD H1, with tight stop losses and trailing stops..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Market</label>
          <select id="ai-market"><option value="forex">Forex</option><option value="crypto">Crypto</option><option value="indices">Indices</option></select>
        </div>
        <div class="form-group">
          <label>Risk Profile</label>
          <select id="ai-risk"><option value="low">Low</option><option selected value="medium">Medium</option><option value="high">High</option></select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary btn-md" onclick="runAIGenerate()">Generate Strategy</button>
      </div>
      <div id="ai-result" style="display:none;margin-top:16px"></div>
    </div>
  </div>

  <script src="js/code-generator-mt4.js"></script>
  <script src="js/code-generator-mt5.js"></script>
  <script src="js/app.js"></script>
  <script src="js/builder.js"></script>
</body>
</html>
